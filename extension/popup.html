<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PingPong Tracker</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #eb5e55;
      --primary-glow: rgba(235, 94, 85, 0.4);
      --secondary: #64748b;
      --success: #10b981;
      --success-glow: rgba(16, 185, 129, 0.3);
      --danger: #ef4444;
      --danger-glow: rgba(239, 68, 68, 0.3);
      --card-bg: rgba(30, 41, 59, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --input-bg: rgba(15, 23, 42, 0.8);
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      width: 300px;
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-img {
      width: 28px;
      height: 28px;
    }

    .title {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: linear-gradient(90deg, #f8fafc 0%, #cbd5e1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    .status-container {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--secondary);
      transition: all 0.3s ease;
    }

    .status-dot.connected {
      background-color: var(--success);
      box-shadow: 0 0 10px var(--success-glow);
      animation: pulse-success 2s infinite;
    }

    .status-dot.disconnected {
      background-color: var(--danger);
      box-shadow: 0 0 10px var(--danger-glow);
      animation: pulse-danger 2s infinite;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      backdrop-filter: blur(10px);
      text-align: center;
    }

    .card-text {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin: 0 0 10px 0;
      line-height: 1.4;
    }

    .server-url {
      font-family: monospace;
      font-size: 0.75rem;
      color: #cbd5e1;
      background: rgba(15, 23, 42, 0.6);
      padding: 6px 10px;
      border-radius: 6px;
      display: inline-block;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px 16px;
      background: linear-gradient(135deg, var(--primary) 0%, #d84b42 100%);
      border: none;
      border-radius: 8px;
      color: #ffffff;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      box-shadow: 0 4px 12px var(--primary-glow);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      margin-bottom: 8px;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px var(--primary-glow);
      filter: brightness(1.1);
    }

    .button:active {
      transform: translateY(0);
      box-shadow: 0 2px 6px var(--primary-glow);
    }

    /* Settings toggle link */
    .settings-toggle {
      display: block;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px 0 8px;
      width: 100%;
      letter-spacing: 0.03em;
      transition: color 0.2s;
    }

    .settings-toggle:hover {
      color: var(--text-main);
    }

    /* Settings panel */
    .settings-panel {
      display: none;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      backdrop-filter: blur(10px);
    }

    .settings-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin: 0 0 4px 0;
    }

    .settings-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-main);
      font-size: 0.78rem;
      font-family: monospace;
      padding: 7px 10px;
      margin-bottom: 10px;
      outline: none;
      transition: border-color 0.2s;
    }

    .settings-input:focus {
      border-color: var(--primary);
    }

    .save-btn {
      width: 100%;
      padding: 8px;
      background: rgba(235, 94, 85, 0.15);
      border: 1px solid rgba(235, 94, 85, 0.4);
      border-radius: 6px;
      color: var(--primary);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .save-btn:hover {
      background: rgba(235, 94, 85, 0.25);
    }

    .save-status {
      font-size: 0.72rem;
      text-align: center;
      margin-top: 6px;
      min-height: 14px;
    }

    .footer {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 4px;
    }

    @keyframes pulse-success {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
      70% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    @keyframes pulse-danger {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      70% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-container">
      <img src="icons/icon48.png" alt="PingPong" class="logo-img">
      <h1 class="title">PingPong</h1>
    </div>
    <div class="status-container">
      <span id="status-text">Checking</span>
      <div id="status-dot" class="status-dot"></div>
    </div>
  </div>

  <div class="card">
    <p class="card-text">Backend tracking service endpoint:</p>
    <div id="server-url" class="server-url">Loading...</div>
    <p class="card-text" style="font-size: 0.75rem; margin-top: 10px; margin-bottom: 0;">
      Extension is active. Tracked emails automatically register opens when sent.
    </p>
  </div>

  <a href="#" id="dashboard-btn" class="button">
    <span>Open Dashboard</span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
      <polyline points="15 3 21 3 21 9"></polyline>
      <line x1="10" y1="14" x2="21" y2="3"></line>
    </svg>
  </a>

  <!-- Settings toggle -->
  <button id="settings-toggle" class="settings-toggle">⚙ Settings</button>

  <!-- Settings panel (hidden by default) -->
  <div id="settings-panel" class="settings-panel">
    <p class="settings-label">Backend URL</p>
    <input
      id="base-url-input"
      class="settings-input"
      type="url"
      placeholder="https://your-app.up.railway.app"
      spellcheck="false"
    />

    <p class="settings-label">Dashboard Secret (key=...)</p>
    <input
      id="secret-input"
      class="settings-input"
      type="text"
      placeholder="your-dashboard-secret"
      spellcheck="false"
    />

    <button id="save-btn" class="save-btn">Save & reconnect</button>
    <div id="save-status" class="save-status"></div>
  </div>

  <div class="footer">
    PingPong Email Tracker v1.0.0
  </div>

  <script src="popup.js"></script>
</body>
</html>
